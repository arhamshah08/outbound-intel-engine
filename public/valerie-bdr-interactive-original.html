  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{{ sect.handler }}\" style=\"background:#FFF;border-radius:18px;padding:26px 30px;cursor:pointer;border:1px solid #E8E4DE;display:flex;align-items:center;gap:22px;\" style-hover=\"background:#F7F5F1;border-color:#CAC6C0;\">\n              <span style=\"font-size:26px;font-weight:700;color:#CCC;flex-shrink:0;width:50px;letter-spacing:-0.03em;\">{{ sect.num }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"font-size:26px;font-weight:700;color:#111;letter-spacing:-0.02em;margin-bottom:4px;\">{{ sect.title }}<\u002Fdiv>\n                <div style=\"font-size:15px;color:#666;line-height:1.5;\">{{ sect.exposition }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#F0EDE8;border-radius:999px;padding:6px 15px;font-size:12px;font-weight:600;color:#666;flex-shrink:0;\">{{ sect.tag }}<\u002Fdiv>\n              <div style=\"font-size:22px;color:#CCC;flex-shrink:0;\">→<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== METHODOLOGY ===== -->\n    <sc-if value=\"{{ isMethodology }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:60px 56px;max-width:960px;margin:0 auto;\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <span style=\"font-size:48px;font-weight:700;color:#DDD;letter-spacing:-0.04em;\">01<\u002Fspan>\n          <h2 style=\"font-size:48px;font-weight:700;color:#111;letter-spacing:-0.04em;line-height:1.05;\">Methodology<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size:18px;color:#444;line-height:1.6;max-width:620px;margin-bottom:48px;\">Five criteria, each weighted. Accounts scored independently, then ranked. Total = 100%. The highest-scoring fit drove the full buyer map and campaign.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:0;\">\n          <sc-for list=\"{{ criteria }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;align-items:center;gap:0;padding:20px 0;border-bottom:1px solid #E8E4DE;\">\n              <div style=\"width:72px;flex-shrink:0;font-size:28px;font-weight:900;color:#111;letter-spacing:-0.03em;\">{{ c.weight }}<\u002Fdiv>\n              <div style=\"width:180px;flex-shrink:0;padding:0 20px;\">\n                <div style=\"height:6px;background:#E8E4DE;border-radius:999px;overflow:hidden;\">\n                  <div style=\"height:100%;background:#111;border-radius:999px;width:{{ c.barPct }};\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:1px;height:40px;background:#DDD9D2;flex-shrink:0;\"><\u002Fdiv>\n              <div style=\"width:190px;flex-shrink:0;padding:0 24px;font-size:16px;font-weight:700;color:#111;\">{{ c.name }}<\u002Fdiv>\n              <div style=\"flex:1;font-size:15px;color:#555;line-height:1.55;\">{{ c.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"display:flex;align-items:center;gap:0;padding:18px 0;\">\n            <div style=\"width:72px;flex-shrink:0;font-size:22px;font-weight:900;color:#111;letter-spacing:-0.03em;\">100%<\u002Fdiv>\n            <div style=\"width:180px;flex-shrink:0;padding:0 20px;\">\n              <div style=\"height:6px;background:#111;border-radius:999px;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:1px;height:32px;background:#DDD9D2;flex-shrink:0;\"><\u002Fdiv>\n            <div style=\"padding:0 24px;font-size:15px;font-weight:700;color:#888;\">Total weight · 5 criteria<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:36px;background:#111;border-radius:16px;padding:22px 28px;font-size:15px;color:#AAA;line-height:1.6;\">\n          <strong style=\"color:#FFF;font-weight:700;\">At scale:<\u002Fstrong> Clay · Apollo · LinkedIn Sales Nav · HubSpot/Outreach · Lavender · Gong · Airtable — for enrichment, sequencing, scoring, and iteration.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== PRIORITIZATION ===== -->\n    <sc-if value=\"{{ isPrioritization }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:60px 56px;max-width:880px;margin:0 auto;\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <span style=\"font-size:48px;font-weight:700;color:#DDD;letter-spacing:-0.04em;\">02<\u002Fspan>\n          <h2 style=\"font-size:48px;font-weight:700;color:#111;letter-spacing:-0.04em;line-height:1.05;\">Account Prioritization<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size:18px;color:#444;line-height:1.6;max-width:620px;margin-bottom:48px;\">5 accounts, scored against Valerie's ICP. 2 qualify, 1 is strategically complex, 2 are health systems — disqualified by definition.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:36px;\">\n          <sc-for list=\"{{ accounts }}\" as=\"acct\" hint-placeholder-count=\"5\">\n            <div style=\"background:#FFF;border-radius:18px;padding:22px 26px;border:1px solid #E8E4DE;\">\n              <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:{{ acct.hasBar }};\">\n                <div style=\"font-size:20px;font-weight:700;color:#CCC;width:28px;flex-shrink:0;text-align:right;\">{{ acct.rank }}<\u002Fdiv>\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"font-size:20px;font-weight:700;color:{{ acct.nameColor }};letter-spacing:-0.01em;\">{{ acct.name }}<\u002Fdiv>\n                  <div style=\"font-size:13px;color:#AAA;margin-top:2px;\">{{ acct.reason }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:36px;font-weight:900;color:{{ acct.scoreColor }};letter-spacing:-0.04em;flex-shrink:0;\">{{ acct.total }}<\u002Fdiv>\n                <div style=\"background:{{ acct.tierBg }};color:{{ acct.tierColor }};font-size:12px;font-weight:700;padding:6px 14px;border-radius:999px;white-space:nowrap;flex-shrink:0;\">{{ acct.tier }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px;padding-left:46px;\">\n                <div style=\"height:5px;background:#F0EDE8;border-radius:999px;flex:1;overflow:hidden;\">\n                  <div style=\"height:100%;background:{{ acct.barColor }};border-radius:999px;width:{{ acct.barW }};transition:width 0.6s ease;\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:11px;color:#BBB;flex-shrink:0;\">{{ acct.total }}/100<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <div style=\"background:#FFF;border-radius:16px;padding:18px 24px;border:1px solid #E8E4DE;display:flex;gap:14px;align-items:flex-start;\">\n            <div style=\"width:10px;height:10px;border-radius:50%;background:#16A34A;flex-shrink:0;margin-top:4px;\"><\u002Fdiv>\n            <div><div style=\"font-size:15px;font-weight:700;margin-bottom:4px;\">Tier 1 — Elevate ENT Partners &amp; Growth Orthopedics<\u002Fdiv><div style=\"font-size:14px;color:#555;font-style:italic;line-height:1.55;\">\"You are scaling independent specialty practices. Valerie can help absorb admin volume without adding linear headcount.\"<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#FFF;border-radius:16px;padding:18px 24px;border:1px solid #E8E4DE;display:flex;gap:14px;align-items:flex-start;\">\n            <div style=\"width:10px;height:10px;border-radius:50%;background:#D97706;flex-shrink:0;margin-top:4px;\"><\u002Fdiv>\n            <div><div style=\"font-size:15px;font-weight:700;margin-bottom:4px;\">Tier 2 — US Oncology Network<\u002Fdiv><div style=\"font-size:14px;color:#555;font-style:italic;line-height:1.55;\">\"Position Valerie around specific workflow gaps rather than broad replacement of existing McKesson infrastructure.\"<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#FFF;border-radius:16px;padding:18px 24px;border:1px solid #E8E4DE;display:flex;gap:14px;align-items:flex-start;\">\n            <div style=\"width:10px;height:10px;border-radius:50%;background:#DC2626;flex-shrink:0;margin-top:4px;\"><\u002Fdiv>\n            <div><div style=\"font-size:15px;font-weight:700;color:#AAA;margin-bottom:4px;\">Disqualified — Sutter Health &amp; Baylor Scott &amp; White<\u002Fdiv><div style=\"font-size:14px;color:#AAA;line-height:1.55;\">Health systems — excluded by Valerie's ICP definition. Do not prioritize.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== TARGET ===== -->\n    <sc-if value=\"{{ isTarget }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:60px 56px;max-width:960px;margin:0 auto;\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <span style=\"font-size:48px;font-weight:700;color:#DDD;letter-spacing:-0.04em;\">03<\u002Fspan>\n          <h2 style=\"font-size:48px;font-weight:700;color:#111;letter-spacing:-0.04em;line-height:1.05;\">Why Elevate ENT Wins<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size:18px;color:#444;line-height:1.6;max-width:600px;margin-bottom:48px;\">One MSO, one centralized back office, one buying committee. Three structural reasons it scores 95 out of 100 — and a live acquisition trigger that makes timing right now.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;\">\n          <div style=\"background:#FFF;border-radius:20px;padding:32px 26px;border:1px solid #E8E4DE;\">\n            <div style=\"font-size:52px;font-weight:900;color:#111;letter-spacing:-0.05em;line-height:1;margin-bottom:16px;\">01<\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;margin-bottom:10px;\">One account, not a federation<\u002Fdiv>\n            <div style=\"font-size:14px;color:#555;line-height:1.65;\">A single MSO with a centralized back office — one buying committee, one clear owner for every Valerie product.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#FFF;border-radius:20px;padding:32px 26px;border:1px solid #E8E4DE;\">\n            <div style=\"font-size:52px;font-weight:900;color:#111;letter-spacing:-0.05em;line-height:1;margin-bottom:16px;\">02<\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;margin-bottom:10px;\">Specialty pain = Valerie's products<\u002Fdiv>\n            <div style=\"font-size:14px;color:#555;line-height:1.65;\">PCP referrals, faxed prior auths, high inbound call volume — fax, referral, and call-center automation with no stretch.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#FFF;border-radius:20px;padding:32px 26px;border:1px solid #E8E4DE;\">\n            <div style=\"font-size:52px;font-weight:900;color:#111;letter-spacing:-0.05em;line-height:1;margin-bottom:16px;\">03<\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;margin-bottom:10px;\">A live acquisition trigger<\u002Fdiv>\n            <div style=\"font-size:14px;color:#555;line-height:1.65;\">Actively expanding into LA and TN. Each deal brings integration chaos — and a VP of Integration &amp; Transformation exists to solve it.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#111;border-radius:20px;padding:28px 36px;display:flex;gap:0;align-items:stretch;\">\n          <div style=\"flex:1;padding-right:32px;\"><div style=\"font-size:36px;font-weight:900;color:#FFF;letter-spacing:-0.04em;line-height:1;\">110<\u002Fdiv><div style=\"font-size:12px;color:#666;margin-top:4px;\">ENT locations<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:1px;background:#333;flex-shrink:0;\"><\u002Fdiv>\n          <div style=\"flex:2;padding:0 32px;\"><div style=\"font-size:36px;font-weight:900;color:#FFF;letter-spacing:-0.04em;line-height:1;\">FL · TX · LA · TN<\u002Fdiv><div style=\"font-size:12px;color:#666;margin-top:4px;\">Active expansion states<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:1px;background:#333;flex-shrink:0;\"><\u002Fdiv>\n          <div style=\"flex:1;padding:0 32px;\"><div style=\"font-size:36px;font-weight:900;color:#FFF;letter-spacing:-0.04em;line-height:1;\">95/100<\u002Fdiv><div style=\"font-size:12px;color:#666;margin-top:4px;\">ICP fit score<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:1px;background:#333;flex-shrink:0;\"><\u002Fdiv>\n          <div style=\"flex:1;padding-left:32px;\"><div style=\"font-size:36px;font-weight:900;color:#FFF;letter-spacing:-0.04em;line-height:1;\">#1<\u002Fdiv><div style=\"font-size:12px;color:#666;margin-top:4px;\">Target account<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== BUYERS ===== -->\n    <sc-if value=\"{{ isBuyers }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:60px 56px;max-width:1100px;margin:0 auto;\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <span style=\"font-size:48px;font-weight:700;color:#DDD;letter-spacing:-0.04em;\">04<\u002Fspan>\n          <h2 style=\"font-size:48px;font-weight:700;color:#111;letter-spacing:-0.04em;line-height:1.05;\">Buyer Map<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size:18px;color:#444;line-height:1.6;max-width:640px;margin-bottom:36px;\">5 Director+ contacts at Elevate ENT. Run the AI score analysis to rank them by pain ownership, influence, and urgency — then click any contact to see their outreach profile.<\u002Fp>\n\n        <!-- Score button -->\n        <sc-if value=\"{{ showScoreBtn }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-bottom:28px;\">\n            <button onclick=\"{{ scoreBtn }}\" style=\"background:{{ scoreBtnBg }};color:{{ scoreBtnColor }};border:none;border-radius:16px;padding:18px 32px;font-family:'DM Sans',system-ui;font-size:17px;font-weight:700;cursor:{{ scoreBtnCursor }};display:flex;align-items:center;gap:12px;\">\n              <span>{{ scoreBtnLabel }}<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ isIdle }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"margin-top:10px;font-size:13px;color:#999;display:flex;align-items:center;gap:8px;\">\n                <span style=\"background:#F0EDE8;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:600;color:#777;\">Clay<\u002Fspan>\n                <span style=\"background:#F0EDE8;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:600;color:#777;\">LinkedIn Sales Nav<\u002Fspan>\n                <span style=\"background:#F0EDE8;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:600;color:#777;\">Apollo<\u002Fspan>\n                <span style=\"background:#F0EDE8;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:600;color:#777;\">Web Scraping AI<\u002Fspan>\n                <span style=\"background:#F0EDE8;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:600;color:#777;\">Gong<\u002Fspan>\n                <span style=\"color:#BBB;font-size:12px;\">will be used to compute each score<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Buyer cards row -->\n        <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;\">\n          <sc-for list=\"{{ buyers }}\" as=\"buyer\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ buyer.handler }}\" style=\"background:{{ buyer.cardBg }};border-radius:20px;padding:22px 18px;border:{{ buyer.cardBorder }};cursor:{{ buyer.cardCursor }};transition:border-color 0.15s;\" style-hover=\"border-color:#999;\">\n              <div style=\"width:46px;height:46px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#FFF;margin-bottom:14px;\">{{ buyer.initials }}<\u002Fdiv>\n              <sc-if value=\"{{ buyer.showScore }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:{{ buyer.scoreBg }};display:inline-block;color:{{ buyer.scoreColor }};font-size:24px;font-weight:900;padding:4px 14px;border-radius:999px;margin-bottom:12px;letter-spacing:-0.02em;\">{{ buyer.scoreDisplay }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ buyer.showScanBadge }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:#F0EDE8;display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 12px;margin-bottom:12px;\">\n                  <div style=\"width:7px;height:7px;border-radius:50%;background:#888;animation:pulse 0.8s ease-in-out infinite;\"><\u002Fdiv>\n                  <span style=\"font-size:12px;font-weight:600;color:#888;\">Scanning<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"font-size:14px;font-weight:700;color:#111;line-height:1.3;margin-bottom:4px;\">{{ buyer.name }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:#AAA;line-height:1.4;margin-bottom:10px;\">{{ buyer.title }}<\u002Fdiv>\n              <sc-if value=\"{{ buyer.showPriority }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:#F0EDE8;border-radius:999px;padding:4px 11px;font-size:10px;font-weight:600;color:#777;display:inline-block;\">{{ buyer.priority }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- Scoring panel (during animation) -->\n        <sc-if value=\"{{ isScoring }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#FFF;border-radius:20px;padding:30px 32px;border:2px solid #111;margin-bottom:12px;\">\n            <div style=\"font-size:12px;font-weight:700;color:#AAA;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;\">Scoring<\u002Fdiv>\n            <div style=\"font-size:24px;font-weight:700;color:#111;margin-bottom:24px;\">{{ currentScoringName }}<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:24px;\">\n              <sc-for list=\"{{ toolsDisplay }}\" as=\"tool\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:14px;\">\n                  <span style=\"font-size:18px;width:22px;flex-shrink:0;text-align:center;color:{{ tool.iconColor }};\">{{ tool.icon }}<\u002Fspan>\n                  <span style=\"font-size:16px;font-weight:600;color:{{ tool.nameColor }};min-width:180px;\">{{ tool.name }}<\u002Fspan>\n                  <span style=\"font-size:14px;color:#AAA;font-style:italic;\">{{ tool.detail }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ showCountUp }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:baseline;gap:10px;padding-top:16px;border-top:1px solid #F0EDE8;\">\n                <span style=\"font-size:64px;font-weight:900;color:#111;letter-spacing:-0.05em;line-height:1;\">{{ countUpDisplay }}<\u002Fspan>\n                <span style=\"font-size:24px;color:#CCC;font-weight:700;\">/100<\u002Fspan>\n                <span style=\"font-size:15px;color:#AAA;margin-left:4px;\">ICP fit score<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Buyer detail panel (after scoring, when clicked) -->\n        <sc-if value=\"{{ hasBuyerDetail }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#FFF;border-radius:20px;padding:30px 32px;border:1px solid #E8E4DE;margin-bottom:12px;\" -height:1.6;\">{{ activeBuyerTrigger }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#F5F3EF;border-radius:14px;padding:18px;\"><div style=\"font-size:10px;font-weight:700;color:#AAA;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;\">Pain Angle<\u002Fdiv><div style=\"font-size:14px;color:#333;line-height:1.6;\">{{ activeBuyerAngle }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#F5F3EF;border-radius:14px;padding:18px;\"><div style=\"font-size:10px;font-weight:700;color:#AAA;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;\">Hook<\u002Fdiv><div style=\"font-size:14px;color:#333;line-height:1.6;\">{{ activeBuyerHook }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"background:#FFF;border-radius:14px;padding:16px 22px;border:1px solid #E8E4DE;font-size:14px;color:#666;line-height:1.6;\"><strong style=\"color:#111;font-weight:700;\">Bench:<\u002Fstrong> Liz Rodriguez (President) — co-equal sponsor; use if Amerstein goes cold. Kelly Raible (CMO) — right owner if the patient-conversion angle leads.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== CAMPAIGN ===== -->\n    <sc-if value=\"{{ isCampaign }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:60px 56px;max-width:1100px;margin:0 auto;\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <span style=\"font-size:48px;font-weight:700;color:#DDD;letter-spacing:-0.04em;\">05<\u002Fspan>\n          <h2 style=\"font-size:48px;font-weight:700;color:#111;letter-spacing:-0.04em;line-height:1.05;\">14-Day Campaign<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size:18px;color:#444;line-height:1.6;max-width:680px;margin-bottom:40px;\">7 touchpoints, 2 message styles A/B tested. Hypothesis: <em style=\"color:#333;\">as Elevate adds ENT practices, patient demand leaks before it becomes a booked appointment.<\u002Fem> Click any day node to read the full message.<\u002Fp>\n        <div style=\"position:relative;margin-bottom:36px;padding-bottom:12px;\">\n          <div style=\"position:absolute;top:32px;left:calc(100%/14);right:calc(100%/14);height:2px;background:#E4E0DA;z-index:0;border-radius:999px;\"><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1;\">\n            <sc-for list=\"{{ days }}\" as=\"d\" hint-placeholder-count=\"7\">\n              <div onclick=\"{{ d.handler }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;flex:1;padding:0 4px;\" style-hover=\"opacity:0.75;\">\n                <div style=\"width:64px;height:64px;border-radius:50%;background:{{ d.nodeColor }};border:{{ d.nodeBorder }};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:{{ d.nodeTextColor }};flex-shrink:0;transition:all 0.15s;\">{{ d.day }}<\u002Fdiv>\n                <div style=\"font-size:12px;font-weight:700;color:#444;text-align:center;\">{{ d.label }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#AAA;text-align:center;line-height:1.4;white-space:pre-line;\">{{ d.channelLabel }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#555;text-align:center;line-height:1.4;font-weight:500;\">{{ d.summary }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasCampaignDetail }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#FFF;border-radius:20px;padding:30px 32px;border:1px solid #E8E4DE;margin-bottom:12px;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;\">\n              <div style=\"font-size:20px;font-weight:700;color:#111;letter-spacing:-0.02em;\">{{ activeDayLabel }} — {{ activeDaySummary }}<\u002Fdiv>\n              <button onclick=\"{{ closeCampaignDay }}\" style=\"background:none;border:1px solid #DDD9D2;border-radius:999px;padding:7px 16px;font-family:'DM Sans',system-ui;font-size:12px;color:#888;cursor:pointer;\" style-hover=\"background:#F5F2EC;\">Close ×<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;\">\n              <sc-for list=\"{{ campaignMsgs }}\" as=\"msg\" hint-placeholder-count=\"2\">\n                <button onclick=\"{{ msg.handler }}\" style=\"background:{{ msg.tabBg }};color:{{ msg.tabColor }};border:none;border-radius:999px;padding:8px 18px;font-family:'DM Sans',system-ui;font-size:13px;font-weight:600;cursor:pointer;\">{{ msg.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ activeMsgHasSubject }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#F5F3EF;border-radius:12px;padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;\">\n                <span style=\"font-size:11px;font-weight:700;color:#AAA;text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;\">Subject<\u002Fspan>\n                <span style=\"font-size:15px;font-weight:600;color:#111;font-style:italic;\">{{ activeMsgSubject }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"font-size:15px;color:#333;line-height:1.75;white-space:pre-wrap;background:#FAFAF8;border-radius:14px;padding:24px 26px;border:1px solid #EFECE6;\">{{ activeMsgBody }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"background:#FFF;border-radius:16px;padding:18px 22px;border:1px solid #E8E4DE;display:flex;gap:14px;align-items:flex-start;\">\n          <div style=\"background:#F0EDE8;border-radius:999px;padding:5px 13px;font-size:11px;font-weight:700;color:#777;flex-shrink:0;margin-top:1px;\">A/B TEST<\u002Fdiv>\n          <div style=\"font-size:14px;color:#555;line-height:1.65;\"><strong style=\"color:#111;font-weight:700;\">Formal vs. Pattern Interrupt:<\u002Fstrong> Version A reads as more credible to senior healthcare buyers. Version B is more likely to earn opens and replies. The constant across both: patient demand is leaking before it becomes a booked appointment.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== METRICS ===== -->\n    <sc-if value=\"{{ isMetrics }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:60px 56px;max-width:960px;margin:0 auto;\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <span style=\"font-size:48px;font-weight:700;color:#DDD;letter-spacing:-0.04em;\">06<\u002Fspan>\n          <h2 style=\"font-size:48px;font-weight:700;color:#111;letter-spacing:-0.04em;line-height:1.05;\">Testing &amp; Metrics<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size:18px;color:#444;line-height:1.6;max-width:620px;margin-bottom:48px;\">4 message variables A/B tested across two styles. 5 funnel metrics — from targeting quality to pipeline created — tell me what's working and what to adjust next.<\u002Fp>\n        <div style=\"font-size:15px;font-weight:700;color:#111;margin-bottom:14px;\">Message A/B tests<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:36px;\">\n          <div style=\"background:#FFF;border-radius:18px;padding:22px;border:1px solid #E8E4DE;\"><div style=\"font-size:11px;font-weight:700;color:#AAA;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;\">Subject Line<\u002Fdiv><div style=\"display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;\"><span style=\"background:#F0EDE8;border-radius:999px;padding:3px 10px;font-size:12px;color:#666;font-weight:700;flex-shrink:0;\">A<\u002Fspan><span style=\"font-size:14px;color:#333;font-style:italic;\">\"quick thought on Elevate's new-site intake\"<\u002Fspan><\u002Fdiv><div style=\"display:flex;gap:8px;align-items:flex-start;margin-bottom:12px;\"><span style=\"background:#111;border-radius:999px;padding:3px 10px;font-size:12px;color:#FFF;font-weight:700;flex-shrink:0;\">B<\u002Fspan><span style=\"font-size:14px;color:#333;font-style:italic;\">\"I was asked to reach out to you\"<\u002Fspan><\u002Fdiv><div style=\"font-size:12px;color:#AAA;\">→ Which earns the open<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#FFF;border-radius:18px;padding:22px;border:1px solid #E8E4DE;\"><div style=\"font-size:11px;font-weight:700;color:#AAA;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;\">Call to Action<\u002Fdiv><div style=\"display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;\"><span style=\"background:#F0EDE8;border-radius:999px;padding:3px 10px;font-size:12px;color:#666;font-weight:700;flex-shrink:0;\">A<\u002Fspan><span style=\"font-size:14px;color:#333;font-style:italic;\">\"Worth 15 minutes this week?\"<\u002Fspan><\u002Fdiv><div style=\"display:flex;gap:8px;align-items:flex-start;margin-bottom:12px;\"><span style=\"background:#111;border-radius:999px;padding:3px 10px;font-size:12px;color:#FFF;font-weight:700;flex-shrink:0;\">B<\u002Fspan><span style=\"font-size:14px;color:#333;font-style:italic;\">\"Give me 15 minutes and I'll show you the math\"<\u002Fspan><\u002Fdiv><div style=\"font-size:12px;color:#AAA;\">→ Which earns the reply<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#FFF;border-radius:18px;padding:22px;border:1px solid #E8E4DE;\"><div style=\"font-size:11px;font-weight:700;color:#AAA;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;\">Pain Framing<\u002Fdiv><div style=\"display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;\"><span style=\"background:#F0EDE8;border-radius:999px;padding:3px 10px;font-size:12px;color:#666;font-weight:700;flex-shrink:0;\">A<\u002Fspan><span style=\"font-size:14px;color:#333;font-style:italic;\">\"referral intake a t-size:14px;font-weight:700;color:#888;flex-shrink:0;\">1<\u002Fdiv><div style=\"flex:1;\"><span style=\"font-size:15px;font-weight:700;\">Targeting<\u002Fspan><span style=\"font-size:13px;color:#AAA;margin-left:12px;\">% of contacts matching Director+ ICP<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#777;font-style:italic;\">Did I pick the right buyers?<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#FFF;border-radius:14px;padding:16px 22px;border:1px solid #E8E4DE;display:flex;align-items:center;gap:16px;\"><div style=\"width:34px;height:34px;border-radius:50%;background:#F0EDE8;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#888;flex-shrink:0;\">2<\u002Fdiv><div style=\"flex:1;\"><span style=\"font-size:15px;font-weight:700;\">Attention<\u002Fspan><span style=\"font-size:13px;color:#AAA;margin-left:12px;\">Email open rate + LinkedIn accept rate<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#777;font-style:italic;\">Are subject lines earning opens?<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#FFF;border-radius:14px;padding:16px 22px;border:1px solid #E8E4DE;display:flex;align-items:center;gap:16px;\"><div style=\"width:34px;height:34px;border-radius:50%;background:#F0EDE8;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#888;flex-shrink:0;\">3<\u002Fdiv><div style=\"flex:1;\"><span style=\"font-size:15px;font-weight:700;\">Relevance<\u002Fspan><span style=\"font-size:13px;color:#AAA;margin-left:12px;\">Reply rate + positive reply rate<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#777;font-style:italic;\">Is the pain hypothesis resonating?<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#FFF;border-radius:14px;padding:16px 22px;border:1px solid #E8E4DE;display:flex;align-items:center;gap:16px;\"><div style=\"width:34px;height:34px;border-radius:50%;background:#F0EDE8;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#888;flex-shrink:0;\">4<\u002Fdiv><div style=\"flex:1;\"><span style=\"font-size:15px;font-weight:700;\">Conversion<\u002Fspan><span style=\"font-size:13px;color:#AAA;margin-left:12px;\">Meetings booked<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#777;font-style:italic;\">Did the campaign create pipeline?<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#FFF;border-radius:14px;padding:16px 22px;border:1px solid #E8E4DE;display:flex;align-items:center;gap:16px;\"><div style=\"width:34px;height:34px;border-radius:50%;background:#F0EDE8;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#888;flex-shrink:0;\">5<\u002Fdiv><div style=\"flex:1;\"><span style=\"font-size:15px;font-weight:700;\">Learning<\u002Fspan><span style=\"font-size:13px;color:#AAA;margin-left:12px;\">Objection themes + persona response rate<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#777;font-style:italic;\">How should the next sequence change?<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== TOOLS ===== -->\n    <sc-if value=\"{{ isTools }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:60px 56px;max-width:960px;margin:0 auto;\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;\">\n          <span style=\"font-size:48px;font-weight:700;color:#DDD;letter-spacing:-0.04em;\">07<\u002Fspan>\n          <h2 style=\"font-size:48px;font-weight:700;color:#111;letter-spacing:-0.04em;line-height:1.05;\">Tools &amp; Open Questions<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size:18px;color:#444;line-height:1.6;max-width:620px;margin-bottom:48px;\">The full stack I'd deploy at scale, and 4 questions that would sharpen the next campaign before it launches.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;\">\n          <div>\n            <div style=\"font-size:15px;font-weight:700;margin-bottom:14px;\">Tools at scale<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px;\">\n              <div style=\"background:#FFF;border-radius:14px;padding:16px 20px;border:1px solid #E8E4DE;\"><div style=\"font-size:15px;font-weight:700;\">Clay<\u002Fdiv><div style=\"font-size:13px;color:#AAA;margin-top:2px;line-height:1.5;\">Build + enrich contact list with titles, LinkedIn, emails, phones, and triggers<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#FFF;border-radius:14px;padding:16px 20px;border:1px solid #E8E4DE;\"><div style=\"font-size:15px;font-weight:700;\">LinkedIn Sales Navigator<\u002Fdiv><div style=\"font-size:13px;color:#AAA;margin-top:2px;line-height:1.5;\">Find Director+ buyers in Ops, Patient Access, Revenue Cycle, Finance, Integration<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#FFF;border-radius:14px;padding:16px 20px;border:1px solid #E8E4DE;\"><div style=\"font-size:15px;font-weight:700;\">Apollo / Outreach / HubSpot<\u002Fdiv><div style=\"font-size:13px;color:#AAA;margin-top:2px;line-height:1.5;\">Run the 14-day multichannel sequence and track every touch<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#FFF;border-radius:14px;padding:16px 20px;border:1px solid #E8E4DE;\"><div style=\"font-size:15px;font-weight:700;\">ChatGPT / Claude / Lavender<\u002Fdiv><div style=\"font-size:13px;color:#AAA;margin-top:2px;line-height:1.5;\">Generate persona variants, objection handling, and call openers<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#FFF;border-radius:14px;padding:16px 20px;border:1px solid #E8E4DE;\"><div style=\"font-size:15px;font-weight:700;\">Gong / Chorus<\u002Fdiv><div style=\"font-size:13px;color:#AAA;margin-top:2px;line-height:1.5;\">Review call recordings, objections, and winning talk tracks<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#FFF;border-radius:14px;padding:16px 20px;border:1px solid #E8E4DE;\"><div style=\"font-size:15px;font-weight:700;\">Airtable / Zapier / Make<\u002Fdiv><div style=\"font-size:13px;color:#AAA;margin-top:2px;line-height:1.5;\">Campaign dashboard and automated handoffs between tools<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:15px;font-weight:700;margin-bottom:14px;\">Open questions for Valerie<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <div style=\"background:#FFF;border-radius:16px;padding:22px;border:1px solid #E8E4DE;\"><div style=\"font-size:36px;font-weight:900;color:#111;letter-spacing:-0.04em;margin-bottom:8px;\">01<\u002Fdiv><div style=\"font-size:15px;color:#333;line-height:1.65;\">Does Valerie usually land first through call center, referral automation, or fax automation?<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#FFF;border-radius:16px;padding:22px;border:1px solid #E8E4DE;\"><div style=\"font-size:36px;font-weight:900;color:#111;letter-spacing:-0.04em;margin-bottom:8px;\">02<\u002Fdiv><div style=\"font-size:15px;color:#333;line-height:1.65;\">Which persona is usually the strongest champion — Ops, Patient Access, CFO, or CEO?<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#FFF;border-radius:16px;padding:22px;border:1px solid #E8E4DE;\"><div style=\"font-size:36px;font-weight:900;color:#111;letter-spacing:-0.04em;margin-bottom:8px;\">03<\u002Fdiv><div style=\"font-size:15px;color:#333;line-height:1.65;\">What case-study metric resonates most with specialty MSOs?<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#FFF;border-radius:16px;padding:22px;border:1px solid #E8E4DE;\"><div style=\"font-size:36px;font-weight:900;color:#111;letter-spacing:-0.04em;margin-bottom:8px;\">04<\u002Fdiv><div style=\"font-size:15px;color:#333;line-height:1.65;\">Which EMR / integration constraints most affect implementation at newly acquired practices?<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:800}}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'overview',\n    activeBuyer: null,\n    activeCampaignDay: null,\n    activeCampaignMsg: 0,\n    scoringPhase: 'idle',\n    currentScoringIdx: -1,\n    buyerScores: [null, null, null, null, null],\n    currentTools: [],\n    countUpValue: null,\n  };\n\n  sectionData = [\n    { id:'methodology', num:'01', title:'Methodology', exposition:'How accounts were scored, selected, and sequenced against Valerie\\'s ICP.', tag:'Framework' },\n    { id:'prioritization', num:'02', title:'Account Prioritization', exposition:'5 accounts scored. 2 qualify, 1 is strategic, 2 are disqualified as health systems.', tag:'Analysis' },\n    { id:'target', num:'03', title:'Why Elevate ENT', exposition:'One MSO, one buying committee, three reasons it scores highest — plus a live acquisition trigger.', tag:'Target Account' },\n    { id:'buyers', num:'04', title:'Buyer Map', exposition:'5 Director+ contacts. Run the AI score analysis, then click any contact to see their outreach profile.', tag:'5 Leads' },\n    { id:'campaign', num:'05', title:'14-Day Campaign', exposition:'Full multichannel sequence with every message, A/B tested. Click any day to read the copy.', tag:'Outreach' },\n    { id:'metrics', num:'06', title:'Testing & Metrics', exposition:'4 message variables A/B tested. 5 funnel metrics to measure and iterate the campaign.', tag:'Measurement' },\n    { id:'tools', num:'07', title:'Tools & Open Questions', exposition:'The full stack I\\'d use at scale, plus 4 questions to sharpen the next campaign.', tag:'Operations' },\n  ];\n\n  buyerData = [\n    { name:'Amy Verlsteffen', initials:'AV', title:'VP Operations (FL) / VP Patient Access', scoreBand:'high', priority:'1st Priority', role:'Owns all patient scheduling + contact centers across FL and TX.', trigger:'Actively building a contact-center strategy in each region.', angle:'Missed inbound calls and unfilled appointment slots.', hook:'Call-center + scheduling automation. Pilot one region, template across.' },\n    { name:'Michael Amerstein', initials:'MA', title:'Chief Operating Officer', scoreBand:'high', priority:'2nd Priority', role:'Owns front-office performance and standardization across 110 locations.', trigger:'Ex-COO Axia Women\\'s Health, ex-CEO Peak Dental. Has scaled multi-site ops before.', angle:'Standardizing the front office as acquisitions stack up.', hook:'Full Valerie bundle at half the labor cost.' },\n    { name:'Corie Opdyke', initials:'CO', title:'VP Integration & Transformation', scoreBand:'high', priority:'3rd Priority', role:'Owns integration of every newly acquired practice.', trigger:'Active acquisition pace = perpetual front-office chaos.', angle:'Every new practice arrives with broken phones, fax, and scheduling.', hook:'A new practice runs on the Valerie model from week one.' },\n    { name:'Sylvain Foster', initials:'SF', title:'Chief Financial Officer', scoreBand:'mid', priority:'4th Priority', role:'Owns RCM, procurement, and decision support. The economic buyer.', trigger:'Front-office headcount grows in step with every new location.', angle:'Headcount scales linearly with locations — until Valerie.', hook:'Fax + referral automation with clear, measurable ROI.' },\n    { name:'Cliff Hogan', initials:'CH', title:'Chief Information Officer', scoreBand:'mid', priority:'Supporting Role', role:'Technical gatekeeper. Can block or enable.', trigger:'Standardizing front-office tech across mixed EMRs mid-integration.', angle:'Mixed EMRs across newly acquired practices.', hook:'Valerie layers on existing EMRs. No rip-and-replace.' },\n  ];\n\n  finalScores = [72, 71, 70, 64, 58];\n\n  toolSets = [\n    [{ name:'LinkedIn Sales Nav', detail:'found contact + 3 recent posts' }, { name:'Clay', detail:'enriched email + phone' }, { name:'Apollo', detail:'ICP fit score computed' }],\n    [{ name:'LinkedIn Sales Nav', detail:'found 8 mutual connections' }, { name:'Gong', detail:'matched talk track patterns' }, { name:'Apollo', detail:'verified Director+ role' }],\n    [{ name:'Clay', detail:'acquisition trigger detected' }, { name:'LinkedIn Sales Nav', detail:'confirmed active role' }, { name:'Web Scraping AI', detail:'Elevate press release found' }],\n    [{ name:'Apollo', detail:'RCM buyer pattern matched' }, { name:'LinkedIn Sales Nav', detail:'5 connections found' }, { name:'Clay', detail:'enriched RCM signals' }],\n    [{ name:'LinkedIn Sales Nav', detail:'technical gatekeeper flagged' }, { name:'Apollo', detail:'IT stack identified' }, { name:'Web Scraping AI', detail:'EMR vendor data scraped' }],\n  ];\n\n  dayData = [\n    { day:1, label:'Day 1', channelLabel:'Email A/B\\nLinkedIn', summary:'Open cold + connect', messages:[{ label:'Email · Version A (Formal)', subject:'quick thought on Elevate\\'s new-site intake', body:'Hi Amy,\\n\\nI\\'m reaching out because Elevate looks like one of the clearest fits for what we\\'re building at Valerie.\\n\\nWhen ENT platforms add practices, the first operational strain is often not clinical capacity — it is the front office: faxes, referrals, call-backs, and scheduling follow-up that do not scale cleanly across sites.\\n\\nValerie helps independent specialty groups automate that work so teams can convert more patients without adding linear headcount.\\n\\nWorth 15 minutes this week? I can walk through where groups like Elevate usually lose patients between referral received and appointment booked.\\n\\nBest, Pushti' }, { label:'Email · Version B (Pattern Interrupt)', subject:'I was asked to reach out to you', body:'Hi Amy,\\n\\nI\\'ll be straight about who asked — my own team did.\\n\\nWe\\'re building Valerie, an AI front office for independent specialty groups, and when I mapped which platforms would benefit most, Elevate came up first.\\n\\nSo yes, this is a cold note, but there is a real reason behind it: my hunch is that the front office at newer Elevate practices is buried in faxes, referrals, and patient call-backs.\\n\\nGive me 15 minutes and I\\'ll show you where patients are most likely slipping out before anyone gets them scheduled.\\n\\nBest, Pushti' }, { label:'LinkedIn Connect', subject:null, body:'Send a connection request with no note.' }] },\n    { day:3, label:'Day 3', channelLabel:'Call\\nVoicemail', summary:'Cold call + voicemail', messages:[{ label:'Call Opener', subject:null, body:'Hey Amy, how are you doing?\\n\\n(High pitch — pattern interrupt.)\\n\\nListen, I\\'ll be honest — this is a cold call, but I promise it is a well-researched cold call. I\\'ll only take 30 seconds to explain why I called, and if it doesn\\'t feel useful, feel free to hang up on me.' }, { label:'Voicemail', subject:null, body:'Hi Amy, it\\'s Pushti from Valerie Health. If you have 15 minutes on Thursday, I can show you where patient demand may be leaking before it becomes booked visits.' }] },\n    { day:5, label:'Day 5', channelLabel:'Email A/B', summary:'Value angle — intake lag', messages:[{ label:'Email · Version A', subject:'the hidden cost of intake lag', body:'Hi Amy,\\n\\nBefore you scroll past this — hear me out.\\n\\nIn fast-growing specialty groups, patient demand often exists before the practice captures it. A referral comes in. A fax sits. A patient misses a call. A scheduler gets buried. None of that looks dramatic once, but across multiple ENT sites, it quietly turns into lost booked visits.\\n\\nValerie helps front-office teams process referrals, faxes, and scheduling work faster, with humans-in-the-loop where needed.\\n\\nWorth 15 minutes? Best, Pushti' }, { label:'Email · Version B', subject:'before you scroll past this', body:'(Same body — testing \"before you scroll past this\" vs. the formal subject line.)' }] },\n    { day:7, label:'Day 7', channelLabel:'LinkedIn', summary:'Curiosity message', messages:[{ label:'LinkedIn Message', subject:null, body:'Hi Amy, this isn\\'t a pitch, I promise. Genuinely curious: when an ENT platform acquires as fast as Elevate, is front-office intake usually the first thing that strains, or am I overrating it?\\n\\nEven a one-word reply would help me understand the market better. And if I\\'m right, I can show you where that intake layer may be leaking booked visits.' }] },\n    { day:9, label:'Day 9', channelLabel:'Call\\nVoicemail', summary:'Final phone nudge', messages:[{ label:'Call + Voicemail', subject:null, body:'Hi Amy, Pushti again with Valerie. Last quick phone nudge from me. I still think Elevate is one of the clearest fits for what we\\'re building, because the growth model depends on converting patient demand efficiently across sites.\\n\\nIf front-office intake is already solved, I\\'m off base. If it is still uneven across newer practices, I think we can be useful. My number is [number].' }] },\n    { day:11, label:'Day 11', channelLabel:'Email A/B', summary:'Where platforms strain first', messages:[{ label:'Email · Version A', subject:'where specialty platforms usually feel it first', body:'Hi Amy,\\n\\nI almost didn\\'t send this because it felt direct, but I think it is the right question.\\n\\nThe ENT groups one step ahead on the acquisition curve usually hit the same wall: front-office capacity at newer sites. The issue is rarely one big failure — it is usually small leakage across referral queues, fax handling, missed call-backs, and scheduling delays.\\n\\nValerie helps claw that capacity back without adding proportional headcount.\\n\\nCould I have 15 minutes this Thursday? Best, Pushti' }, { label:'Email · Version B', subject:'I almost didn\\'t send this', body:'(Same body — testing \"I almost didn\\'t send this\" vs. the formal variant.)' }] },\n    { day:14, label:'Day 14', channelLabel:'Breakup\\nEmail', summary:'Breakup + leave open', messages:[{ label:'Email · Version A', subject:'should I close the loop?', body:'Hi Amy,\\n\\nNo reply usually means wrong time, wrong person, or wrong priority — all fair. I\\'ll close the loop here.\\n\\nMy guess was that as Elevate scales, referral intake, faxes, and patient call-backs may become harder to standardize across practices.\\n\\nIf that is not a current priority, no worries. If it becomes one later, Valerie would be useful for converting more patient demand without adding proportional headcount.\\n\\nWe\\'ve got your back. Best, Pushti' }, { label:'Email · Version B', subject:'I hate doing this', body:'(Same body — testing \"I hate doing this\" vs. the formal breakup variant.)' }] },\n  ];\n\n  startScoring() {\n    if (this._timers) this._timers.forEach(t => { try { clearTimeout(t); clearInterval(t); } catch(e){} });\n    this._timers = [];\n    this.setState({ scoringPhase:'running', buyerScores:[null,null,null,null,null], currentScoringIdx:0, currentTools:[], countUpValue:null });\n    let delay = 100;\n    for (let i = 0; i < 5; i++) {\n      const tools = this.toolSets[i];\n      const finalScore = this.finalScores[i];\n      const bd = delay;\n      const t0 = setTimeout(() => this.setState({ currentScoringIdx:i, currentTools:[{ ...tools[0], status:'scanning' }], countUpValue:null }), bd);\n      this._timers.push(t0);\n      const t1 = setTimeout(() => this.setState({ currentTools:[{ ...tools[0], status:'done' }, { ...tools[1], status:'scanning' }] }), bd + 450);\n      this._timers.push(t1);\n      const t2 = setTimeout(() => this.setState({ currentTools:[{ ...tools[0], status:'done' }, { ...tools[1], status:'done' }, { ...tools[2], status:'scanning' }] }), bd + 900);\n      this._timers.push(t2);\n      const t3 = setTimeout(() => {\n        this.setState({ currentTools:[{ ...tools[0], status:'done' }, { ...tools[1], status:'done' }, { ...tools[2], status:'done' }], countUpValue:0 });
